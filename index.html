<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OCA Java SE 8 — Exam Simulator</title>
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="questions-data.js" onerror="console.info('No questions-data.js found — using built-in demo question set.')"></script>

<style>
/* ── Design tokens ─────────────────────────────────────────────────────── */
:root {
  /* Core palette — warm white + Java-orange accent */
  --bg:          #f5f6f8;
  --bg-2:        #eef0f3;
  --surface:     #ffffff;
  --surface-2:   #f9fafb;
  --border:      #d8dce5;
  --border-soft: #e8eaee;

  --ink:         #111827;
  --ink-2:       #4b5563;
  --ink-3:       #9ca3af;

  --accent:      #e05a00;   /* deep Java orange — readable on white */
  --accent-dim:  rgba(224,90,0,.08);
  --accent-ring: rgba(224,90,0,.2);

  --blue:        #1d4ed8;
  --blue-dim:    rgba(29,78,216,.08);

  --green:       #15803d;
  --green-dim:   rgba(21,128,61,.09);

  --red:         #b91c1c;
  --red-dim:     rgba(185,28,28,.09);

  --amber:       #b45309;
  --amber-dim:   rgba(180,83,9,.1);

  /* Type */
  --sans: "Inter", -apple-system, system-ui, sans-serif;
  --mono: "JetBrains Mono", "SFMono-Regular", Consolas, monospace;

  /* Geometry */
  --r:    8px;
  --r-sm: 5px;
  --r-lg: 12px;

  /* Shadows */
  --shadow-sm: 0 1px 3px rgba(0,0,0,.08);
  --shadow:    0 4px 16px rgba(0,0,0,.10);
  --shadow-lg: 0 12px 40px rgba(0,0,0,.14);
}

/* ── Reset ─────────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--sans);
  font-size: 15px;
  line-height: 1.55;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}
button { font-family: var(--sans); cursor: pointer; }
button:focus-visible,
input:focus-visible,
select:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
}
.hidden { display: none !important; }
.visually-hidden { position: absolute; left: -9999px; }

/* ── App shell ─────────────────────────────────────────────────────────── */
#app { min-height: 100vh; display: flex; flex-direction: column; }

/* ═══════════════════════════════════════════════════════════════════════
   SETUP SCREEN
═══════════════════════════════════════════════════════════════════════ */
#screen-setup {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 32px 16px;
  background:
    radial-gradient(ellipse 80% 50% at 50% -10%, rgba(224,90,0,.06) 0%, transparent 70%);
}

.setup-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  width: 100%;
  max-width: 660px;
  padding: 36px 38px;
  box-shadow: var(--shadow-lg);
}

.setup-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--accent-dim);
  border: 1px solid var(--accent-ring);
  border-radius: 999px;
  padding: 4px 12px;
  font-family: var(--mono);
  font-size: 11.5px;
  font-weight: 600;
  color: var(--accent);
  letter-spacing: .05em;
  text-transform: uppercase;
  margin-bottom: 14px;
}
.setup-badge::before {
  content: '';
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--accent);
  animation: pulse 2s ease infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: .4; }
}

.setup-card h1 {
  margin: 0 0 6px;
  font-size: 26px;
  font-weight: 700;
  line-height: 1.2;
  color: var(--ink);
}
.setup-sub {
  color: var(--ink-3);
  margin: 0 0 26px;
  font-size: 13.5px;
  font-family: var(--mono);
}

.data-pill {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--blue-dim);
  border: 1px solid rgba(59,130,246,.2);
  border-radius: var(--r-sm);
  padding: 6px 12px;
  font-size: 12.5px;
  color: var(--blue);
  margin-bottom: 24px;
  font-family: var(--mono);
}

/* ── Section divider label ─── */
.section-label {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .08em;
  color: var(--ink-3);
  margin: 0 0 10px;
}

/* ── Field grid ─── */
.field-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  margin-bottom: 16px;
}
.field { display: flex; flex-direction: column; gap: 6px; }
.field label {
  font-size: 12px;
  font-weight: 600;
  color: var(--ink-2);
  text-transform: uppercase;
  letter-spacing: .04em;
}
.field input[type=number],
.field select {
  font-family: var(--mono);
  font-size: 14.5px;
  padding: 10px 12px;
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  color: var(--ink);
  transition: border-color .15s;
  width: 100%;
}
.field input[type=number]:hover,
.field select:hover { border-color: var(--ink-3); }
.field input[type=number]:focus,
.field select:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 0 3px var(--accent-ring); }

/* ── Topics box ─── */
.topics-box {
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  padding: 10px 12px;
  max-height: 150px;
  overflow-y: auto;
  margin-bottom: 16px;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}
.topics-box label {
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 4px 2px;
  font-size: 13px;
  color: var(--ink-2);
  cursor: pointer;
  border-radius: 4px;
  transition: color .1s;
}
.topics-box label:hover { color: var(--ink); }
.topics-box input[type=checkbox] { accent-color: var(--accent); width: 14px; height: 14px; }

/* ── Toggle row ─── */
.toggle-row {
  display: flex;
  flex-wrap: wrap;
  gap: 8px 20px;
  margin-bottom: 24px;
}
.toggle-row label {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  color: var(--ink-2);
  cursor: pointer;
}
.toggle-row label:hover { color: var(--ink); }
.toggle-row input[type=checkbox] { accent-color: var(--accent); width: 14px; height: 14px; }

/* ── Buttons ─── */
.btn {
  border: none;
  border-radius: var(--r-sm);
  padding: 10px 18px;
  font-size: 14px;
  font-weight: 600;
  transition: all .15s;
  white-space: nowrap;
}
.btn-primary {
  background: var(--accent);
  color: #fff;
  box-shadow: 0 2px 8px rgba(249,115,22,.3);
}
.btn-primary:hover {
  background: #fb923c;
  box-shadow: 0 4px 12px rgba(249,115,22,.4);
  transform: translateY(-1px);
}
.btn-primary:active { transform: translateY(0); }
.btn-ghost {
  background: transparent;
  color: var(--ink-2);
  border: 1px solid var(--border);
}
.btn-ghost:hover { background: var(--surface-2); color: var(--ink); border-color: var(--ink-3); }
.btn-block { width: 100%; padding: 13px; font-size: 15px; }

.setup-note {
  font-size: 12px;
  color: var(--ink-3);
  margin-top: 14px;
  line-height: 1.6;
}

/* ═══════════════════════════════════════════════════════════════════════
   EXAM HEADER
═══════════════════════════════════════════════════════════════════════ */
#exam-header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  height: 56px;
  gap: 12px;
  position: sticky;
  top: 0;
  z-index: 10;
  box-shadow: 0 1px 4px rgba(0,0,0,.06);
}

/* Progress bar under header */
#exam-header::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0;
  height: 2px;
  background: var(--accent);
  width: var(--progress, 0%);
  transition: width .3s ease;
}

.timer {
  font-family: var(--mono);
  font-size: 17px;
  font-weight: 700;
  letter-spacing: .04em;
  background: var(--bg-2);
  border: 1px solid var(--border);
  padding: 5px 12px;
  border-radius: var(--r-sm);
  min-width: 80px;
  text-align: center;
  color: var(--ink);
  transition: background .3s, color .3s;
}
.timer.low {
  background: var(--red-dim);
  border-color: rgba(185,28,28,.25);
  color: var(--red);
  animation: tick .5s ease infinite alternate;
}
@keyframes tick {
  from { opacity: 1; }
  to   { opacity: .65; }
}
.timer.practice {
  color: var(--ink-3);
  border-color: transparent;
  background: transparent;
  font-size: 13px;
}

.exam-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--ink-2);
  text-align: center;
  flex: 1;
  font-family: var(--mono);
}

.header-right {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 12.5px;
  font-family: var(--mono);
  color: var(--ink-3);
}

.header-btn {
  background: var(--surface-2);
  color: var(--ink-2);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  padding: 6px 12px;
  font-size: 12px;
  font-weight: 600;
  font-family: var(--sans);
  transition: all .15s;
}
.header-btn:hover { background: var(--border); color: var(--ink); }

/* ═══════════════════════════════════════════════════════════════════════
   EXAM BODY
═══════════════════════════════════════════════════════════════════════ */
#exam-body {
  flex: 1;
  display: flex;
  justify-content: center;
  padding: 28px 16px 120px;
}

.question-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  width: 100%;
  max-width: 780px;
  padding: 30px 32px;
  align-self: flex-start;
  box-shadow: var(--shadow);
}

/* ── Question meta ─── */
.q-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
}
.q-number {
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 600;
  color: var(--ink-3);
  text-transform: uppercase;
  letter-spacing: .06em;
}
.q-topic {
  font-size: 11.5px;
  font-weight: 600;
  color: var(--accent);
  background: var(--accent-dim);
  border: 1px solid var(--accent-ring);
  border-radius: 999px;
  padding: 2px 10px;
  max-width: 50%;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.q-select-hint {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 12px;
  font-weight: 600;
  color: var(--amber);
  background: var(--amber-dim);
  border: 1px solid rgba(245,158,11,.25);
  border-radius: var(--r-sm);
  padding: 3px 10px;
  margin-bottom: 16px;
  font-family: var(--mono);
}

/* ── Question stem (code block style) ─── */
.q-stem {
  font-family: var(--mono);
  font-size: 13.5px;
  white-space: pre-wrap;
  word-break: break-word;
  background: #fafbfc;
  border: 1px solid var(--border);
  border-left: 3px solid var(--accent);
  border-radius: var(--r-sm);
  padding: 18px 20px;
  margin-bottom: 22px;
  line-height: 1.7;
  color: var(--ink);
}

/* ── Options ─── */
.options {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 8px;
}

.option {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  padding: 12px 15px;
  cursor: pointer;
  background: var(--surface);
  transition: border-color .12s, background .12s, transform .1s;
  position: relative;
}
.option:hover {
  border-color: var(--accent);
  background: var(--accent-dim);
  transform: translateX(2px);
}
.option.selected {
  border-color: var(--accent);
  background: var(--accent-dim);
}
.option.selected::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: var(--accent);
  border-radius: var(--r-sm) 0 0 var(--r-sm);
}
.option input {
  margin-top: 3px;
  accent-color: var(--accent);
  width: 15px;
  height: 15px;
  flex-shrink: 0;
}
.option .opt-label {
  font-family: var(--mono);
  font-weight: 700;
  font-size: 13px;
  color: var(--ink-3);
  width: 18px;
  flex-shrink: 0;
  transition: color .12s;
}
.option.selected .opt-label,
.option:hover .opt-label { color: var(--accent); }
.option .opt-text {
  white-space: pre-wrap;
  font-size: 14px;
  color: var(--ink);
  line-height: 1.55;
}

/* Review states */
.option.correct {
  border-color: var(--green);
  background: var(--green-dim);
}
.option.correct::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: var(--green);
  border-radius: var(--r-sm) 0 0 var(--r-sm);
}
.option.correct .opt-label { color: var(--green); }
.option.incorrect {
  border-color: var(--red);
  background: var(--red-dim);
}
.option.incorrect::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: var(--red);
  border-radius: var(--r-sm) 0 0 var(--r-sm);
}
.option.incorrect .opt-label { color: var(--red); }

/* ── Practice panel ─── */
.practice-panel {
  margin-top: 20px;
  padding-top: 18px;
  border-top: 1px solid var(--border);
}
.practice-feedback {
  font-weight: 700;
  font-size: 13.5px;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 7px;
}
.practice-feedback.ok { color: var(--green); }
.practice-feedback.no { color: var(--red); }
.explanation {
  font-size: 13.5px;
  color: var(--ink-2);
  white-space: pre-wrap;
  line-height: 1.65;
  background: #fafbfc;
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  padding: 14px 16px;
}
.explanation strong { color: var(--accent); }

/* ═══════════════════════════════════════════════════════════════════════
   EXAM FOOTER
═══════════════════════════════════════════════════════════════════════ */
#exam-footer {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: rgba(255,255,255,.95);
  border-top: 1px solid var(--border);
  padding: 10px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  flex-wrap: wrap;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  z-index: 9;
}
.footer-left, .footer-right { display: flex; gap: 8px; align-items: center; }

.flag-btn {
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  padding: 9px 14px;
  font-size: 13px;
  font-weight: 600;
  color: var(--ink-2);
  display: flex;
  align-items: center;
  gap: 6px;
  transition: all .15s;
}
.flag-btn:hover { border-color: var(--amber); color: var(--amber); background: var(--amber-dim); }
.flag-btn.active {
  background: var(--amber-dim);
  border-color: rgba(245,158,11,.4);
  color: var(--amber);
}

/* ═══════════════════════════════════════════════════════════════════════
   OVERLAYS
═══════════════════════════════════════════════════════════════════════ */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.65);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  z-index: 50;
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
}

.overlay-panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  width: 100%;
  max-width: 560px;
  max-height: 80vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  box-shadow: var(--shadow-lg);
}

.overlay-header {
  padding: 16px 22px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.overlay-header h2 { margin: 0; font-size: 16px; font-weight: 700; color: var(--ink); }
.overlay-close {
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  font-size: 16px;
  color: var(--ink-2);
  width: 28px; height: 28px;
  display: flex; align-items: center; justify-content: center;
  transition: all .15s;
}
.overlay-close:hover { color: var(--ink); background: var(--border); }

.overlay-body { padding: 18px 22px; overflow-y: auto; scrollbar-width: thin; }
.overlay-footer {
  padding: 14px 22px;
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
}

/* ── Q-grid ─── */
.grid-legend {
  display: flex;
  gap: 14px;
  flex-wrap: wrap;
  font-size: 11.5px;
  color: var(--ink-3);
  margin-bottom: 14px;
  font-family: var(--mono);
}
.legend-dot {
  display: inline-block;
  width: 10px; height: 10px;
  border-radius: 3px;
  margin-right: 4px;
  vertical-align: middle;
}

.q-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(38px, 1fr));
  gap: 6px;
}
.q-cell {
  aspect-ratio: 1;
  border-radius: var(--r-sm);
  border: 1px solid var(--border);
  background: var(--surface);
  font-family: var(--mono);
  font-weight: 700;
  font-size: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  color: var(--ink-2);
  transition: all .12s;
}
.q-cell:hover { border-color: var(--accent); color: var(--accent); }
.q-cell.answered { background: var(--accent-dim); border-color: var(--accent-ring); color: var(--accent); }
.q-cell.flagged::after {
  content: '';
  position: absolute;
  top: -3px; right: -3px;
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--amber);
  border: 1px solid var(--surface);
}
.q-cell.current { outline: 2px solid var(--ink-2); outline-offset: 2px; }

.overlay-stats { font-size: 12px; color: var(--ink-3); font-family: var(--mono); }

/* ── Confirm overlay ─── */
.confirm-body p { font-size: 14px; margin: 0 0 10px; color: var(--ink-2); }
.confirm-warn { color: var(--amber); font-weight: 600; }
.confirm-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }

/* ═══════════════════════════════════════════════════════════════════════
   RESULTS SCREEN
═══════════════════════════════════════════════════════════════════════ */
#screen-results {
  flex: 1;
  display: flex;
  justify-content: center;
  padding: 40px 16px;
  background: radial-gradient(ellipse 60% 40% at 50% 0%, rgba(224,90,0,.05) 0%, transparent 70%);
}
.results-card { width: 100%; max-width: 660px; }

.score-banner {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: 36px 32px;
  text-align: center;
  margin-bottom: 18px;
  box-shadow: var(--shadow);
}
.score-ring {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 120px; height: 120px;
  border-radius: 50%;
  border: 4px solid var(--border);
  margin-bottom: 16px;
  position: relative;
}
.score-ring.pass { border-color: var(--green); box-shadow: 0 0 24px rgba(21,128,61,.15); }
.score-ring.fail { border-color: var(--red);   box-shadow: 0 0 24px rgba(185,28,28,.15); }
.pct { font-family: var(--mono); font-size: 40px; font-weight: 700; line-height: 1; }
.pct.pass { color: var(--green); }
.pct.fail { color: var(--red); }
.verdict { font-size: 14px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; margin-top: 8px; }
.verdict.pass { color: var(--green); }
.verdict.fail { color: var(--red); }
.score-sub { color: var(--ink-3); font-size: 13px; margin-top: 8px; font-family: var(--mono); }

.topic-table {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: 20px 24px;
  margin-bottom: 22px;
  box-shadow: var(--shadow);
}
.topic-table h3 { margin: 0 0 14px; font-size: 11px; text-transform: uppercase; letter-spacing: .08em; color: var(--ink-3); }
.topic-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 0;
  border-bottom: 1px solid var(--border-soft);
  font-size: 13.5px;
  gap: 12px;
}
.topic-row:last-child { border-bottom: none; }
.topic-name { color: var(--ink-2); flex: 1; }
.topic-bar-wrap { flex: 0 0 80px; }
.topic-bar {
  height: 4px;
  border-radius: 2px;
  background: var(--border);
  overflow: hidden;
}
.topic-bar-fill { height: 100%; border-radius: 2px; background: var(--accent); transition: width .5s ease; }
.frac { font-family: var(--mono); color: var(--ink-3); font-size: 12.5px; flex: 0 0 40px; text-align: right; }

.results-actions { display: flex; gap: 10px; justify-content: center; }

/* ═══════════════════════════════════════════════════════════════════════
   REVIEW SCREEN
═══════════════════════════════════════════════════════════════════════ */
#screen-review { flex: 1; padding: 24px 16px 60px; }
.review-wrap { max-width: 780px; margin: 0 auto; }
.review-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
  flex-wrap: wrap;
  gap: 12px;
}
.review-top h1 { font-size: 20px; margin: 0; }
.filter-chips { display: flex; gap: 6px; }
.chip {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 999px;
  padding: 5px 14px;
  font-size: 12.5px;
  font-weight: 600;
  color: var(--ink-2);
  transition: all .12s;
}
.chip:hover { border-color: var(--ink-3); color: var(--ink); }
.chip.active { background: var(--accent); border-color: var(--accent); color: #fff; }

.review-item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: 22px 26px;
  margin-bottom: 14px;
  box-shadow: var(--shadow-sm);
}
.review-item-head {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 12px;
  gap: 10px;
}
.review-item-head .left { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
.tag {
  font-size: 10.5px;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 4px;
  text-transform: uppercase;
  letter-spacing: .04em;
  font-family: var(--mono);
}
.tag.ok  { background: var(--green-dim); color: var(--green); border: 1px solid rgba(34,197,94,.25); }
.tag.no  { background: var(--red-dim);   color: var(--red);   border: 1px solid rgba(239,68,68,.25); }
.tag.flag{ background: var(--amber-dim); color: var(--amber); border: 1px solid rgba(245,158,11,.25); }

/* ═══════════════════════════════════════════════════════════════════════
   MISC
═══════════════════════════════════════════════════════════════════════ */
.bottom-bar-spacer { height: 70px; }

/* Scrollbar styling */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--ink-3); }

@media (max-width: 640px) {
  .field-row { grid-template-columns: 1fr; }
  .setup-card { padding: 24px 20px; }
  .question-card { padding: 20px; }
  .q-grid { grid-template-columns: repeat(auto-fill, minmax(32px, 1fr)); }
  .exam-title { display: none; }
  .topic-bar-wrap { display: none; }
}

/* Smooth fade-in for question card */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}
.question-card { animation: fadeUp .2s ease both; }
</style>
</head>
<body>
<div id="app">

<!-- ======================= SETUP SCREEN ======================= -->
<section id="screen-setup">
  <div class="setup-card">
    <span class="setup-badge">Practice exam configuration</span>
    <h1>OCA Java SE 8<br>Exam Simulator</h1>
    <p class="setup-sub">1Z0-808 · Oracle Certified Associate, Java SE 8 Programmer</p>
    <div class="data-pill" id="data-source-pill">
      <span>⬡</span>
      <span id="data-source-text"></span>
    </div>

    <div class="field-row">
      <div class="field">
        <label for="cfg-count">Questions</label>
        <input type="number" id="cfg-count" min="1">
      </div>
      <div class="field">
        <label for="cfg-minutes">Time limit (min)</label>
        <input type="number" id="cfg-minutes" min="1" value="150">
      </div>
    </div>
    <div class="field-row">
      <div class="field">
        <label for="cfg-pass">Passing score (%)</label>
        <input type="number" id="cfg-pass" min="1" max="100" value="65">
      </div>
      <div class="field">
        <label for="cfg-mode">Mode</label>
        <select id="cfg-mode">
          <option value="exam">Exam — timed, submit to see results</option>
          <option value="practice">Practice — instant feedback per question</option>
        </select>
      </div>
    </div>

    <p class="section-label" style="margin-top:4px;">Topics to include</p>
    <div class="topics-box" id="topics-box"></div>

    <div class="toggle-row">
      <label><input type="checkbox" id="cfg-shuffle-q" checked> Shuffle questions</label>
      <label><input type="checkbox" id="cfg-shuffle-opt" checked> Shuffle options</label>
    </div>

    <button class="btn btn-primary btn-block" id="btn-start">Start exam →</button>
    <p class="setup-note" id="setup-note"></p>
  </div>
</section>

<!-- ======================= EXAM SCREEN ======================= -->
<div id="screen-exam" class="hidden">
  <header id="exam-header">
    <div class="timer" id="timer-display">--:--</div>
    <div class="exam-title">OCA Java SE 8 — 1Z0-808</div>
    <div class="header-right">
      <span id="progress-label">1 / 1</span>
      <button class="header-btn" id="btn-review-screen">Question map</button>
    </div>
  </header>

  <main id="exam-body">
    <div class="question-card">
      <div class="q-meta">
        <span class="q-number" id="q-number-label">Question 1</span>
        <span class="q-topic" id="q-topic-label"></span>
      </div>
      <span class="q-select-hint" id="q-select-hint"></span>
      <div class="q-stem" id="q-stem"></div>
      <div class="options" id="q-options"></div>

      <div class="practice-panel hidden" id="practice-panel">
        <button class="btn btn-ghost" id="btn-check-answer" style="font-size:13px;padding:8px 16px;">Check answer</button>
        <div class="hidden" id="practice-feedback-wrap" style="margin-top:14px;">
          <div class="practice-feedback" id="practice-feedback"></div>
          <div class="explanation" id="practice-explanation"></div>
        </div>
      </div>
    </div>
    <div class="bottom-bar-spacer"></div>
  </main>

  <footer id="exam-footer">
    <div class="footer-left">
      <button class="btn btn-ghost" id="btn-prev">← Prev</button>
      <button class="flag-btn" id="btn-flag">
        <span id="flag-icon">⚑</span>
        <span id="flag-label">Flag</span>
      </button>
    </div>
    <div class="footer-right">
      <button class="btn btn-ghost" id="btn-submit-open" style="font-size:13px;">Submit exam</button>
      <button class="btn btn-primary" id="btn-next">Next →</button>

</div>

<!-- ======================= QUESTION MAP OVERLAY ======================= -->
<div id="overlay-grid" class="overlay hidden">
  <div class="overlay-panel">
    <div class="overlay-header">
      <h2>Question map</h2>
      <button class="overlay-close" id="btn-close-grid" aria-label="Close">✕</button>
    </div>
    <div class="overlay-body">
      <div class="grid-legend">
        <span><span class="legend-dot" style="background:var(--accent-dim);border:1px solid var(--accent-ring)"></span>Answered</span>
        <span><span class="legend-dot" style="background:var(--bg-2);border:1px solid var(--border)"></span>Unanswered</span>
        <span><span class="legend-dot" style="background:var(--amber);border-radius:50%;width:8px;height:8px;display:inline-block;"></span>Flagged</span>
      </div>

    </div>
    <div class="overlay-footer">
      <span class="overlay-stats" id="grid-stats"></span>
      <button class="btn btn-primary" id="btn-submit-from-grid">Submit exam</button>
    </div>
  </div>
</div>

<!-- ======================= SUBMIT CONFIRM ======================= -->
<div id="overlay-confirm" class="overlay hidden">
  <div class="overlay-panel" style="max-width:440px;">
    <div class="overlay-header"><h2>Submit exam?</h2></div>
    <div class="overlay-body confirm-body">
      <p id="confirm-summary"></p>
      <p class="confirm-warn hidden" id="confirm-warn-unanswered"></p>
      <p class="confirm-warn hidden" id="confirm-warn-flagged"></p>
      <div class="confirm-actions">
        <button class="btn btn-ghost" id="btn-confirm-cancel">Keep working</button>
        <button class="btn btn-primary" id="btn-confirm-submit">Submit now</button>
      </div>

</div>

<!-- ======================= RESULTS SCREEN ======================= -->
<section id="screen-results" class="hidden">
  <div class="results-card">
    <div class="score-banner">
      <div class="score-ring" id="score-ring">
        <div class="pct" id="result-pct">0%</div>
      </div>
      <div class="verdict" id="result-verdict">—</div>
      <div class="score-sub" id="result-sub"></div>
    </div>
    <div class="topic-table">
      <h3>Score by topic</h3>
      <div id="topic-breakdown"></div>
    </div>
    <div class="results-actions">
      <button class="btn btn-ghost" id="btn-back-to-setup">New exam</button>
      <button class="btn btn-primary" id="btn-go-review">Review answers →</button>
    </div>
  </div>
</section>

<!-- ======================= FULL REVIEW SCREEN ======================= -->
<section id="screen-review" class="hidden">
  <div class="review-wrap">
    <div class="review-top">
      <h1>Answer review</h1>
      <div class="filter-chips">
        <button class="chip active" data-filter="all">All</button>
        <button class="chip" data-filter="incorrect">Incorrect</button>
        <button class="chip" data-filter="flagged">Flagged</button>
      </div>
    </div>
    <div id="review-list"></div>
    <button class="btn btn-ghost" id="btn-review-back" style="margin-top:8px;">← Back to results</button>
  </div>
</section>

</div>

<script>
/* =========================================================================
   DEMO QUESTION SET
   ========================================================================= */
const DEMO_DATA = [
  {
    id: "demo.1", topic: "Working with Java Data Types",
    question: 'What does the following code print?\n\nint x = 7;\ndouble y = x / 2;\nSystem.out.println(y);',
    selectCount: 1,
    options: [
      { label: "A", text: "3.0" },
      { label: "B", text: "3.5" },
      { label: "C", text: "4.0" },
      { label: "D", text: "Compilation fails" }
    ],
    correctAnswers: ["A"],
    explanation: "x / 2 is evaluated first, and both operands are int, so this performs integer division: 7 / 2 = 3 (the remainder is discarded). Only after that result is computed does it get widened to a double for the assignment to y, giving 3.0 — not 3.5. To get 3.5 you would need at least one operand to be a floating-point type before the division happens, e.g. x / 2.0."
  },
  {
    id: "demo.2", topic: "Using Operators and Decision Constructs",
    question: 'What is printed by the following code?\n\nint a = 5;\nint b = a++ + ++a;\nSystem.out.println(b);',
    selectCount: 1,
    options: [
      { label: "A", text: "10" },
      { label: "B", text: "11" },
      { label: "C", text: "12" },
      { label: "D", text: "13" }
    ],
    correctAnswers: ["C"],
    explanation: "a++ is post-increment: it evaluates to the current value of a (5), and then a becomes 6. ++a is pre-increment: a becomes 7 first, and that 7 is the value used. So b = 5 + 7 = 12."
  },
  {
    id: "demo.3", topic: "Creating and Using Arrays",
    question: 'What happens when the following code runs?\n\nint[] arr = new int[5];\nSystem.out.println(arr[5]);',
    selectCount: 1,
    options: [
      { label: "A", text: "Prints 0" },
      { label: "B", text: "Compilation fails" },
      { label: "C", text: "Throws ArrayIndexOutOfBoundsException at runtime" },
      { label: "D", text: "Throws NullPointerException at runtime" }
    ],
    correctAnswers: ["C"],
    explanation: "new int[5] creates an array with valid indices 0 through 4. Index 5 is out of bounds, so the JVM throws an ArrayIndexOutOfBoundsException at runtime. The code compiles fine — array bounds are not checked by the compiler."
  },
  {
    id: "demo.4", topic: "Using Loop Constructs",
    question: 'What is the output?\n\nfor (int i = 0; i < 3; i++) {\n    if (i == 1) continue;\n    System.out.print(i);\n}',
    selectCount: 1,
    options: [
      { label: "A", text: "012" },
      { label: "B", text: "02" },
      { label: "C", text: "01" },
      { label: "D", text: "0" }
    ],
    correctAnswers: ["B"],
    explanation: "continue skips the rest of the current loop iteration and moves straight to the next one. When i == 1, continue fires before print(i) runs, so 1 is skipped. The loop prints 0, then 2, giving \"02\"."
  },
  {
    id: "demo.5", topic: "Working with Inheritance",
    question: 'class Animal {\n  String speak() { return "..."; }\n}\nclass Dog extends Animal {\n  String speak() { return "Woof"; }\n}\n\nAnimal a = new Dog();\nSystem.out.println(a.speak());\n\nWhat is printed?',
    selectCount: 1,
    options: [
      { label: "A", text: "..." },
      { label: "B", text: "Woof" },
      { label: "C", text: "Compilation fails" },
      { label: "D", text: "ClassCastException is thrown at runtime" }
    ],
    correctAnswers: ["B"],
    explanation: "The reference type of a is Animal, but the actual object is a Dog. Instance method calls are resolved using the object's runtime type (dynamic/virtual dispatch), not the reference's declared type, so Dog's overridden speak() runs and \"Woof\" is printed."
  },
  {
    id: "demo.6", topic: "Handling Exceptions",
    question: 'public static void main(String[] args) {\n    try {\n        System.out.println("A");\n        throw new RuntimeException("boom");\n    } finally {\n        System.out.println("B");\n    }\n}\n\nWhat happens when main runs?',
    selectCount: 1,
    options: [
      { label: "A", text: "Prints A only" },
      { label: "B", text: "Prints A and B, then the program terminates because of the uncaught exception" },
      { label: "C", text: "Prints A, B, and the program continues normally afterward" },
      { label: "D", text: "Compilation fails because there is no catch block" }
    ],
    correctAnswers: ["B"],
    explanation: "A try block does not require a catch block as long as it has a finally block (or vice versa), so this compiles fine. At runtime, \"A\" is printed, then the exception is thrown. Before the exception propagates out of the method, the finally block always runs, printing \"B\". Since nothing catches the RuntimeException, it then propagates out of main and the JVM terminates the program, printing a stack trace."
  },
  {
    id: "demo.7", topic: "Working with Java API — String",
    question: 'String s = "Hello";\ns.concat(" World");\nSystem.out.println(s);\n\nWhat is printed?',
    selectCount: 1,
    options: [
      { label: "A", text: "Hello" },
      { label: "B", text: "Hello World" },
      { label: "C", text: "Compilation fails" },
      { label: "D", text: "NullPointerException is thrown" }
    ],
    correctAnswers: ["A"],
    explanation: "String objects are immutable. concat() returns a new String containing the combined text, but it does not modify s itself, and the return value here is discarded. Since s was never reassigned, it still refers to the original \"Hello\"."
  },
  {
    id: "demo.8", topic: "Working with Java API — ArrayList",
    question: 'List<String> list = new ArrayList<>();\nlist.add("a");\nlist.add("b");\nlist.remove("a");\nSystem.out.println(list.size());\n\nWhat is printed?',
    selectCount: 1,
    options: [
      { label: "A", text: "0" },
      { label: "B", text: "1" },
      { label: "C", text: "2" },
      { label: "D", text: "Compilation fails" }
    ],
    correctAnswers: ["B"],
    explanation: "remove(Object) removes the first element equal to the given object — here it removes the String \"a\". After adding two elements and removing one, exactly one element (\"b\") remains, so size() returns 1."
  },
  {
    id: "demo.9", topic: "Lambda Expressions",
    question: "Which of the following correctly assigns a lambda expression to a Runnable?",
    selectCount: 1,
    options: [
      { label: "A", text: 'Runnable r = () -> System.out.println("Running");' },
      { label: "B", text: 'Runnable r = (x) -> System.out.println("Running");' },
      { label: "C", text: 'Runnable r = void -> System.out.println("Running");' },
      { label: "D", text: 'Runnable r = System.out.println("Running");' }
    ],
    correctAnswers: ["A"],
    explanation: "Runnable's single abstract method, run(), takes no parameters and returns void. A lambda assigned to it must match that shape, so () -> ... is correct. Option B supplies a parameter the functional interface doesn't accept, so it fails to compile. Option C uses void as if it were a parameter name in an invalid position. Option D assigns the (void) result of a method call directly, which is not a lambda expression at all and does not compile."
  },
  {
    id: "demo.10", topic: "Class Design — Access Modifiers",
    question: "Which of the following access modifiers can legally be applied to a top-level (non-nested) class declaration? (Select 2 options)",
    selectCount: 2,
    options: [
      { label: "A", text: "public" },
      { label: "B", text: "private" },
      { label: "C", text: "protected" },
      { label: "D", text: "(no modifier — package-private)" },
      { label: "E", text: "static" }
    ],
    correctAnswers: ["A", "D"],
    explanation: "A top-level class may be declared public, or with no access modifier at all (package-private/default access). private and protected are only legal on members (fields, methods, constructors) and on nested classes — not on a top-level class. static is similarly only meaningful for nested classes; a top-level class cannot be declared static."
  }
];

const EXAM_DATA_SOURCE = (typeof window.EXAM_DATA !== "undefined" && Array.isArray(window.EXAM_DATA) && window.EXAM_DATA.length)
  ? window.EXAM_DATA : DEMO_DATA;
const USING_CUSTOM_DATA = (typeof window.EXAM_DATA !== "undefined" && Array.isArray(window.EXAM_DATA) && window.EXAM_DATA.length);

/* ── State ─────────────────────────────────────────────────────────────── */
const STATE = {
  exam: [], current: 0, answers: {}, flagged: new Set(),
  mode: "exam", durationSeconds: 0, remainingSeconds: 0,
  timerHandle: null, passPct: 65, submitted: false,
  practiceRevealed: new Set()
};

const el = (id) => document.getElementById(id);

function shuffle(arr){
  const a = arr.slice();
  for(let i = a.length-1; i > 0; i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

/* ── Setup screen ──────────────────────────────────────────────────────── */
function initSetupScreen(){
  el("data-source-text").textContent = USING_CUSTOM_DATA
    ? `${EXAM_DATA_SOURCE.length} questions loaded from questions-data.js`
    : `${EXAM_DATA_SOURCE.length} built-in demo questions`;

  const topics = Array.from(new Set(EXAM_DATA_SOURCE.map(q => q.topic || "General"))).sort();
  el("topics-box").innerHTML = topics.map(t =>
    `<label><input type="checkbox" class="topic-check" value="${escapeHtml(t)}" checked>${escapeHtml(t)}</label>`
  ).join("");

  el("cfg-count").value = Math.min(80, EXAM_DATA_SOURCE.length);
  el("cfg-count").max  = EXAM_DATA_SOURCE.length;

  el("setup-note").textContent = USING_CUSTOM_DATA
    ? "Custom question bank loaded."
    : "Running on built-in demo questions. Place questions-data.js next to this file to load your real question bank.";

  el("cfg-mode").addEventListener("change", () => {
    const isPractice = el("cfg-mode").value === "practice";
    el("cfg-minutes").disabled = isPractice;
    el("cfg-minutes").parentElement.style.opacity = isPractice ? .45 : 1;
  });

  el("btn-start").addEventListener("click", startExam);
}

/* ── Start exam ────────────────────────────────────────────────────────── */
function startExam(){
  const checkedTopics = Array.from(document.querySelectorAll(".topic-check:checked")).map(c => c.value);
  let pool = EXAM_DATA_SOURCE.filter(q => checkedTopics.includes(q.topic || "General"));
  if(!pool.length){ alert("Select at least one topic."); return; }

  const shuffleQ   = el("cfg-shuffle-q").checked;
  const shuffleOpt = el("cfg-shuffle-opt").checked;
  let count = parseInt(el("cfg-count").value, 10) || pool.length;
  count = Math.min(Math.max(count, 1), pool.length);

  let working = shuffleQ ? shuffle(pool) : pool.slice();
  working = working.slice(0, count);

  STATE.mode            = el("cfg-mode").value;
  STATE.passPct         = parseInt(el("cfg-pass").value, 10) || 65;
  STATE.durationSeconds = (parseInt(el("cfg-minutes").value, 10) || 150) * 60;
  STATE.remainingSeconds= STATE.durationSeconds;
  STATE.current         = 0;
  STATE.answers         = {};
  STATE.flagged         = new Set();
  STATE.submitted       = false;
  STATE.practiceRevealed= new Set();

  STATE.exam = working.map(q => ({
    ...q,
    _options: shuffleOpt ? shuffle(q.options) : q.options.slice()
  }));

  el("screen-setup").classList.add("hidden");
  el("screen-exam").classList.remove("hidden");
  el("screen-results").classList.add("hidden");
  el("screen-review").classList.add("hidden");

  if(STATE.mode === "practice"){
    el("timer-display").textContent = "PRACTICE";
    el("timer-display").classList.add("practice");
  } else {
    el("timer-display").classList.remove("practice");
    startTimer();
  }

  renderQuestion();
}

/* ── Timer ─────────────────────────────────────────────────────────────── */
function startTimer(){
  clearInterval(STATE.timerHandle);
  updateTimerDisplay();
  STATE.timerHandle = setInterval(() => {
    STATE.remainingSeconds--;
    if(STATE.remainingSeconds <= 0){
      STATE.remainingSeconds = 0;
      updateTimerDisplay();
      clearInterval(STATE.timerHandle);
      submitExam(true);
      return;
    }
    updateTimerDisplay();
  }, 1000);
}

function updateTimerDisplay(){
  const m = Math.floor(STATE.remainingSeconds/60);
  const s = STATE.remainingSeconds % 60;
  el("timer-display").textContent = `${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
  el("timer-display").classList.toggle("low", STATE.remainingSeconds <= 300);
}

/* ── Render question ───────────────────────────────────────────────────── */
function renderQuestion(){
  const q   = STATE.exam[STATE.current];
  const idx = STATE.current;
  const total = STATE.exam.length;

  // Update header
  el("q-number-label").textContent  = `Question ${idx+1}`;
  el("q-topic-label").textContent   = q.topic || "";
  el("progress-label").textContent  = `${idx+1} / ${total}`;
  el("q-select-hint").textContent   = q.selectCount > 1 ? `Select ${q.selectCount} answers` : "Select 1 answer";
  el("q-stem").textContent          = q.question;

  // Progress bar via CSS variable
  const header = document.getElementById("exam-header");
  header.style.setProperty("--progress", `${((idx+1)/total*100).toFixed(1)}%`);

  const selected = STATE.answers[idx] || [];
  const revealed  = STATE.mode === "practice" && STATE.practiceRevealed.has(idx);

  // Build options
  el("q-options").innerHTML = "";
  q._options.forEach(opt => {
    const isChecked  = selected.includes(opt.label);
    const wrap       = document.createElement("label");
    let cls          = "option";
    if(isChecked) cls += " selected";
    if(revealed){
      if(q.correctAnswers.includes(opt.label)) cls += " correct";
      else if(isChecked) cls += " incorrect";
    }
    wrap.className = cls;
    const inputType = q.selectCount > 1 ? "checkbox" : "radio";
    wrap.innerHTML = `
      <input type="${inputType}" name="opt" ${isChecked?"checked":""} ${revealed?"disabled":""}>
      <span class="opt-label">${opt.label}</span>
      <span class="opt-text"></span>
    `;
    wrap.querySelector(".opt-text").textContent = opt.text;
    wrap.querySelector("input").addEventListener("change", () => toggleOption(idx, opt.label, q));
    el("q-options").appendChild(wrap);
  });

  // Practice panel
  if(STATE.mode === "practice"){
    el("practice-panel").classList.remove("hidden");
    el("btn-check-answer").classList.toggle("hidden", revealed);
    el("practice-feedback-wrap").classList.toggle("hidden", !revealed);
    if(revealed){
      const isRight = q.correctAnswers.slice().sort().join(",") === (STATE.answers[idx]||[]).slice().sort().join(",");
      const fb = el("practice-feedback");
      fb.textContent = isRight ? "✓ Correct" : `✗ Incorrect — correct: ${q.correctAnswers.join(", ")}`;
      fb.className   = "practice-feedback " + (isRight ? "ok" : "no");
      el("practice-explanation").textContent = q.explanation || "No explanation available.";
    }
  } else {
    el("practice-panel").classList.add("hidden");
  }

  // Nav buttons
  el("btn-prev").disabled = idx === 0;
  el("btn-prev").style.opacity = idx === 0 ? .35 : 1;
  el("btn-next").textContent = idx === total-1 ? "Finish →" : "Next →";

  // Flag button
  const isFlagged = STATE.flagged.has(idx);
  el("btn-flag").classList.toggle("active", isFlagged);
  el("flag-label").textContent = isFlagged ? "Flagged" : "Flag";

  // Scroll top
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function toggleOption(idx, label, q){
  let sel = STATE.answers[idx] ? STATE.answers[idx].slice() : [];
  if(q.selectCount > 1){
    sel = sel.includes(label) ? sel.filter(l => l !== label) : [...sel, label];
  } else {
    sel = [label];
  }
  STATE.answers[idx] = sel;
  renderQuestion();
}

/* ── Nav ───────────────────────────────────────────────────────────────── */
el("btn-prev").addEventListener("click", () => {
  if(STATE.current > 0){ STATE.current--; renderQuestion(); }
});
el("btn-next").addEventListener("click", () => {
  if(STATE.current < STATE.exam.length-1){ STATE.current++; renderQuestion(); }
  else { openConfirmSubmit(); }
});
el("btn-flag").addEventListener("click", () => {
  STATE.flagged.has(STATE.current) ? STATE.flagged.delete(STATE.current) : STATE.flagged.add(STATE.current);
  renderQuestion();
});
el("btn-check-answer").addEventListener("click", () => {
  STATE.practiceRevealed.add(STATE.current);
  renderQuestion();
});

/* ── Question map overlay ──────────────────────────────────────────────── */
function openGrid(){
  const grid = el("q-grid");
  grid.innerHTML = "";
  let answered = 0, flagged = 0;
  STATE.exam.forEach((q,i) => {
    const isAnswered = STATE.answers[i] && STATE.answers[i].length > 0;
    const isFlagged  = STATE.flagged.has(i);
    if(isAnswered) answered++;
    if(isFlagged)  flagged++;
    const cell = document.createElement("button");
    cell.className = "q-cell" +
      (isAnswered ? " answered" : "") +
      (isFlagged  ? " flagged"  : "") +
      (i === STATE.current ? " current" : "");
    cell.textContent = i+1;
    cell.addEventListener("click", () => { STATE.current = i; closeGrid(); renderQuestion(); });
    grid.appendChild(cell);
  });
  el("grid-stats").textContent = `${answered}/${STATE.exam.length} answered · ${flagged} flagged`;
  el("overlay-grid").classList.remove("hidden");
}
function closeGrid(){ el("overlay-grid").classList.add("hidden"); }
el("btn-review-screen").addEventListener("click", openGrid);
el("btn-close-grid").addEventListener("click", closeGrid);
el("btn-submit-from-grid").addEventListener("click", () => { closeGrid(); openConfirmSubmit(); });

/* ── Confirm submit ─────────────────────────────────────────────────────── */
function openConfirmSubmit(){
  const unanswered = STATE.exam.reduce((n,_,i) => n + ((STATE.answers[i]&&STATE.answers[i].length)?0:1), 0);
  const flaggedN   = STATE.flagged.size;
  el("confirm-summary").textContent = `${STATE.exam.length - unanswered} of ${STATE.exam.length} questions answered.`;
  const wU = el("confirm-warn-unanswered");
  wU.classList.toggle("hidden", unanswered === 0);
  wU.textContent = `${unanswered} question${unanswered===1?"":"s"} left unanswered.`;
  const wF = el("confirm-warn-flagged");
  wF.classList.toggle("hidden", flaggedN === 0);
  wF.textContent = `${flaggedN} question${flaggedN===1?"":"s"} still flagged.`;
  el("overlay-confirm").classList.remove("hidden");
}
el("btn-confirm-cancel").addEventListener("click", () => el("overlay-confirm").classList.add("hidden"));
el("btn-confirm-submit").addEventListener("click", () => { el("overlay-confirm").classList.add("hidden"); submitExam(false); });
el("btn-submit-open").addEventListener("click", openConfirmSubmit);

/* ── Scoring + Results ──────────────────────────────────────────────────── */
function isQuestionCorrect(idx){
  const q     = STATE.exam[idx];
  const user  = (STATE.answers[idx]||[]).slice().sort().join(",");
  const right = q.correctAnswers.slice().sort().join(",");
  return user === right && user.length > 0;
}

function submitExam(timeExpired){
  clearInterval(STATE.timerHandle);
  STATE.submitted = true;

  let correctCount = 0;
  const byTopic = {};
  STATE.exam.forEach((q,i) => {
    const topic = q.topic || "General";
    byTopic[topic] = byTopic[topic] || { correct:0, total:0 };
    byTopic[topic].total++;
    if(isQuestionCorrect(i)){ correctCount++; byTopic[topic].correct++; }
  });

  const pct    = Math.round((correctCount / STATE.exam.length) * 100);
  const passed = pct >= STATE.passPct;

  el("result-pct").textContent = pct + "%";
  el("result-pct").className   = "pct " + (passed ? "pass" : "fail");
  el("result-verdict").textContent = passed ? "PASS ✓" : "FAIL";
  el("result-verdict").className   = "verdict " + (passed ? "pass" : "fail");
  el("result-sub").textContent = `${correctCount} of ${STATE.exam.length} correct · passing score ${STATE.passPct}%`
    + (timeExpired ? " · time expired" : "");

  const ring = el("score-ring");
  ring.className = "score-ring " + (passed ? "pass" : "fail");

  const breakdown = el("topic-breakdown");
  breakdown.innerHTML = Object.keys(byTopic).sort().map(t => {
    const d   = byTopic[t];
    const pct = Math.round((d.correct/d.total)*100);
    return `<div class="topic-row">
      <span class="topic-name">${escapeHtml(t)}</span>
      <div class="topic-bar-wrap"><div class="topic-bar"><div class="topic-bar-fill" style="width:${pct}%"></div></div></div>
      <span class="frac">${d.correct}/${d.total}</span>
    </div>`;
  }).join("");

  el("screen-exam").classList.add("hidden");
  el("overlay-grid").classList.add("hidden");
  el("overlay-confirm").classList.add("hidden");
  el("screen-results").classList.remove("hidden");
}

el("btn-back-to-setup").addEventListener("click", () => {
  el("screen-results").classList.add("hidden");
  el("screen-setup").classList.remove("hidden");
});
el("btn-go-review").addEventListener("click", () => {
  el("screen-results").classList.add("hidden");
  renderReview("all");
  el("screen-review").classList.remove("hidden");
});
el("btn-review-back").addEventListener("click", () => {
  el("screen-review").classList.add("hidden");
  el("screen-results").classList.remove("hidden");
});

/* ── Full review ────────────────────────────────────────────────────────── */
document.querySelectorAll(".chip").forEach(chip => {
  chip.addEventListener("click", () => {
    document.querySelectorAll(".chip").forEach(c => c.classList.remove("active"));
    chip.classList.add("active");
    renderReview(chip.dataset.filter);
  });
});

function renderReview(filter){
  const list = el("review-list");
  list.innerHTML = "";
  STATE.exam.forEach((q,i) => {
    const correct = isQuestionCorrect(i);
    const flagged = STATE.flagged.has(i);
    if(filter === "incorrect" && correct) return;
    if(filter === "flagged"   && !flagged) return;

    const userSel = STATE.answers[i] || [];
    const item = document.createElement("div");
    item.className = "review-item";

    let tags = `<span class="tag ${correct?"ok":"no"}">${correct?"Correct":"Incorrect"}</span>`;
    if(flagged) tags += ` <span class="tag flag">Flagged</span>`;

    const optionsHtml = q._options.map(opt => {
      const isCorrect    = q.correctAnswers.includes(opt.label);
      const wasSelected  = userSel.includes(opt.label);
      let cls = "option";
      if(isCorrect)   cls += " correct";
      else if(wasSelected) cls += " incorrect";
      return `<div class="${cls}" style="cursor:default;">
        <span class="opt-label">${opt.label}</span>
        <span class="opt-text">${escapeHtml(opt.text)}${wasSelected && !isCorrect ? " ← your answer" : wasSelected ? " ← your answer" : ""}</span>
      </div>`;
    }).join("");

    item.innerHTML = `
      <div class="review-item-head">
        <div class="left">
          <span class="q-number">Q${i+1}</span>
          <span class="q-topic">${escapeHtml(q.topic||"")}</span>
        </div>
        <div>${tags}</div>
      </div>
      <div class="q-stem">${escapeHtml(q.question)}</div>
      <div class="options">${optionsHtml}</div>
      <div class="explanation" style="margin-top:14px;"><strong>Explanation:</strong><br>${escapeHtml(q.explanation||"No explanation available.")}</div>
    `;
    list.appendChild(item);
  });
  if(!list.innerHTML){
    list.innerHTML = `<p style="color:var(--ink-3);padding:20px 0;">No questions match this filter.</p>`;
  }
}

/* ── Init ───────────────────────────────────────────────────────────────── */
initSetupScreen();
</script>
</body>
</html>
